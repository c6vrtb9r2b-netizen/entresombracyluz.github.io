        input, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; }
        button { padding: 12px 20px; background-color: #0f172a; color: white; border: none; cursor: pointer; border-radius: 5px; transition: 0.3s; }

    <div class="contenedor">

        <nav>

<main class="contenedor">
    <section>
        <h2>Contacto</h2>
        <p>¿Tienes alguna duda, sugerencia o te gustaría compartir un caso? Escríbeme desde aquí.</p>
        
        <!-- Para que el formulario funcione, usa Formspree: action="https://formspree.io/f/TU_ID_AQUI" -->
        <form action="https://formspree.io/f/TU_ID_AQUI" method="POST" style="margin-top: 30px;">
            <div class="form-group">
                <label style="font-weight: bold;">Nombre:</label>
                <input type="text" name="nombre" required>
            </div>
            
            <div class="form-group">
                <label style="font-weight: bold;">Correo Electrónico:</label>
                <input type="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label style="font-weight: bold;">Mensaje:</label>
                <textarea name="mensaje" required style="height: 120px; resize: vertical;"></textarea>
            </div>
            
            <button type="submit">Enviar Mensaje</button>
        </form>
    </section>
</main>
