        <h2>Contacto</h2>
        <p>¿Tienes alguna duda, sugerencia o te gustaría compartir un caso? Escríbeme desde aquí.</p>
        
        <form style="margin-top: 30px; display: flex; flex-direction: column; max-width: 500px; gap: 15px;">
            <label style="font-weight: bold;">Nombre:</label>
            <input type="text" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            
            <label style="font-weight: bold;">Correo Electrónico:</label>
            <input type="email" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            
            <label style="font-weight: bold;">Mensaje:</label>
            <textarea style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; height: 120px; resize: vertical;"></textarea>
            
            <button type="button" class="boton" style="border: none; cursor: pointer; align-self: flex-start;">Enviar Mensaje</button>
